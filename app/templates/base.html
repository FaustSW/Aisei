<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Anki Clone{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

    <script>
        (function () {
            const savedTheme = localStorage.getItem('selectedTheme');
            if (!savedTheme) {
                return;
            }
            document.write('<style>body{visibility:hidden;}</style>');
        })();
    </script>

    {% block extra_css %}{% endblock %}
</head>

<body>
    <div class="settings">
        <button type="button" id="settings-btn" class="settings-btn show-settings">Settings</button>
    </div>

    <div id="settings-modal" class="settings-modal-overlay modal-overlay is-hidden">
    <div class="modal-content glass-panel">
        <h2>Settings</h2>

        <div class="settings-option-group">
            <label class="settings-option-label">Theme</label>
            <div class="theme-selector">
                <select id="theme-dropdown" onchange="changeTheme()">
                    <option value="">Loading...</option>
                </select>
            </div>
        </div>

        <hr class="settings-divider">

        {% if session.user_id %}
            <div class="settings-option-group">
                <label class="settings-option-label">Simulated Time</label>
                <div class="sim-time-top-controls">
                    <div id="sim-time-display" class="sim-time-display"></div>
                    <button id="start-sim-time-btn" class="header-btn">Start Simulated Time</button>
                    <div id="sim-time-controls" class="sim-time-controls is-hidden">
                        <button id="sim-time-minus" class="header-btn sim-time-small-btn">-1</button>
                        <button id="sim-time-plus" class="header-btn sim-time-small-btn">+1</button>
                        <div class="sim-time-input-group">
                            <input type="number" id="sim-time-custom" class="sim-time-input" placeholder="Days" inputmode="numeric">
                            <button id="sim-time-apply" class="sim-time-apply-btn">➤</button>
                        </div>
                        <button id="sim-time-reset" class="header-btn">Reset</button>
                    </div>
                </div>
            </div>

            <div class="settings-option-group">
                <label class="settings-option-label" for="daily-new-limit-input">Daily New Card Limit</label>
                <div class="daily-new-limit-controls">
                    <input
                        type="number"
                        id="daily-new-limit-input"
                        class="daily-new-limit-input"
                        min="0"
                        value="{{ daily_new_limit or 20 }}"
                    >
                    <button type="button" id="daily-new-limit-apply" class="header-btn">Apply</button>
                </div>
            </div>

            <div class="settings-option-group">
                <label class="settings-option-label" for="voice-dropdown">TTS Voice</label>
                <select id="voice-dropdown" onchange="changeVoice()">
                    <option value="">Loading...</option>
                </select>
            </div>

        {% else %}
            <div class="guest-notice">
                <p>Log in to access simulated time, daily limits, and custom TTS voices.</p>
            </div>
        {% endif %}

        <div class="modal-actions">
            <button type="button" class="glass-button btn-cancel">Close</button>
            {% if session.user_id %}
                <button type="button" class="glass-button btn-create" onclick="saveAPIKeys()">Save & Continue</button>
            {% endif %}
        </div>
    </div>
</div>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/sim_time.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
